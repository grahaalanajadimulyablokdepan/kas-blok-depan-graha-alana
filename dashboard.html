<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>Dashboard Kas</title>

<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script src="firebase.js"></script>

</head>

<body onload="loadDashboard()">

<header>

<div class="logoArea">

<img src="logo.png">

<h2>KAS BLOK DEPAN ALANA</h2>

</div>

<div class="menuBtn" onclick="toggleMenu()">☰</div>

</header>

<div id="sideMenu">

<button onclick="popupKontak()">Kontak Pengurus</button>

<button onclick="popupKomplain()">Buat Komplain</button>

<button onclick="popupDaftarKomplain()">Daftar Komplain</button>

<button id="adminMenu" onclick="popupInput()">Input Iuran</button>

<button onclick="logout()">Logout</button>

</div>

<div class="dashboard">

<div class="card">

<h3>Total Iuran</h3>

<h1 id="totalIuran">Rp0</h1>

</div>

<div class="card">

<h3>Total Pengeluaran</h3>

<h1 id="totalKeluar">Rp0</h1>

</div>

<div class="card">

<h3>Total Kas</h3>

<h1 id="totalKas">Rp0</h1>

</div>

</div>
  
<!-- POPUP INPUT IURAN -->
<div id="popupIuran" class="popup">

<div class="popupContent">

<h3>Input Iuran</h3>

<select id="iuranBlok">
<option>A1</option>
<option>A2</option>
<option>A3</option>
<option>B1</option>
<option>B2</option>
<option>B3</option>
</select>

<input type="number" id="iuranRumah" placeholder="Nomor Rumah">

<input type="number" id="jumlahIuran" placeholder="Jumlah">

<button onclick="simpanIuran()">Simpan</button>

<button onclick="closePopup('popupIuran')">Tutup</button>

</div>

</div>

  <div id="popupKeluar" class="popup">

<div class="popupContent">

<h3>Input Pengeluaran</h3>

<input id="ketKeluar" placeholder="Keterangan">

<input id="jumlahKeluar" type="number" placeholder="Jumlah">

<button onclick="simpanKeluar()">Simpan</button>

<button onclick="closePopup('popupKeluar')">Tutup</button>

</div>

</div>

  <div id="popupKomplain" class="popup">

<div class="popupContent">

<h3>Kirim Komplain</h3>

<textarea id="pesanKomplain"></textarea>

<button onclick="kirimKomplain()">Kirim</button>

<button onclick="closePopup('popupKomplain')">Tutup</button>

</div>

</div>

  <div id="popupDaftarKomplain" class="popup">

<div class="popupContent">

<h3>Daftar Komplain</h3>

<div id="listKomplain"></div>

<button onclick="closePopup('popupDaftarKomplain')">Tutup</button>

</div>

</div>
<script src="app.js"></script>

</body>
</html>
