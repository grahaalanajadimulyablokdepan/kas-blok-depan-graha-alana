<!DOCTYPE html>
<html>

<head>

<title>Dashboard Kas Graha Alana</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>Dashboard Kas Graha Alana</h1>

<button onclick="logout()">Logout</button>

<div id="dashboardContent">

<h2>Grafik Kas Lingkungan</h2>
<div id="grafikKas"></div>

<h2>Statistik Pembayaran Blok</h2>
<div id="statistikBlok"></div>

<h2>Rumah Belum Bayar</h2>
<div id="rumahBelumBayar"></div>

<h2>Peta Blok Rumah</h2>
<div id="mapPerumahan"></div>

</div>

<script src="app.js"></script>

<script>

if(!localStorage.getItem("wargaLogin") && !localStorage.getItem("adminLogin")){
location.href="index.html"
}

</div>

<!-- ACTION BUTTON -->

<div class="actionButtons">

<button onclick="logoutSystem()">Logout</button>

<button id="btnIuran"
onclick="if(localStorage.getItem('adminLogin')==='true'){showPopup('iuranPopup')}else{alert('Hanya admin')}">
Input Iuran
</button>

<button id="btnPengeluaran"
onclick="if(localStorage.getItem('adminLogin')==='true'){showPopup('pengeluaranPopup')}else{alert('Hanya admin')}">
Input Pengeluaran
</button> 

<button id="btnExport" onclick="exportExcel()">
Export Excel
</button>

</div>

</div>
  
</script>

</body>

</html>
