<!DOCTYPE html>
<html>
<head>

<title>Dashboard Kas</title>
<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<div class="logo">
🏠 KAS BLOK DEPAN ALANA
</div>

<div class="menuBtn" onclick="toggleMenu()">☰</div>

</header>


<div id="sideMenu">

<button onclick="openDashboard()">Dashboard</button>

<button id="menuIuran">Input Iuran</button>
<button id="menuKeluar">Input Pengeluaran</button>

<button onclick="exportExcel()">Export Excel</button>

<button onclick="openKontak()">Kontak Pengurus</button>

<button onclick="openKomplain()">Buat Komplain</button>

<button onclick="openDaftarKomplain()">Daftar Komplain</button>

<button onclick="logout()">Logout</button>

</div>


<div class="dashboard">

<div class="card">

<h3>Total Iuran</h3>
<h2 id="totalIuran">Rp0</h2>

</div>

<div class="card">

<h3>Total Pengeluaran</h3>
<h2 id="totalKeluar">Rp0</h2>

</div>

<div class="card">

<h3>Total Kas</h3>
<h2 id="totalKas">Rp0</h2>

</div>

</div>


<script src="app.js"></script>

</body>
</html>
