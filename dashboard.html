<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>Dashboard Kas</title>

<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script src="firebase.js"></script>

</head>

<body onload="loadDashboard()">

<header>

<div class="logoArea">

<img src="logo.png">

<h2>KAS BLOK DEPAN ALANA</h2>

</div>

<div class="menuBtn" onclick="toggleMenu()">☰</div>

</header>

<div id="sideMenu">

<button onclick="popupKontak()">Kontak Pengurus</button>

<button onclick="popupKomplain()">Buat Komplain</button>

<button onclick="popupDaftarKomplain()">Daftar Komplain</button>

<button id="adminMenu" onclick="popupInput()">Input Iuran</button>

<button onclick="logout()">Logout</button>

</div>

<div class="dashboard">

<div class="card">

<h3>Total Iuran</h3>

<h1 id="totalIuran">Rp0</h1>

</div>

<div class="card">

<h3>Total Pengeluaran</h3>

<h1 id="totalKeluar">Rp0</h1>

</div>

<div class="card">

<h3>Total Kas</h3>

<h1 id="totalKas">Rp0</h1>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
