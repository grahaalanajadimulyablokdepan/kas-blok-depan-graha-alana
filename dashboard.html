<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Dashboard Kas</title>

<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script src="firebase.js"></script>

</head>


<body onload="loadDashboard()">


<!-- HEADER -->

<div class="header">

<div class="logoBox">
<img src="logo.png">
<span>KAS BLOK DEPAN ALANA</span>
</div>

<div class="hamburger" onclick="toggleMenu()">☰</div>

</div>



<!-- SIDEBAR -->

<div class="sidebar" id="sidebar">

<h2>Menu Kas</h2>

<p style="font-size:13px;opacity:0.7;margin-bottom:20px">
Sistem transparansi kas warga  
Graha Alana Blok Depan
</p>

<button onclick="showPopup('iuranPopup')">💰 Input Iuran</button>

<button onclick="showPopup('keluarPopup')">📤 Input Pengeluaran</button>

<button onclick="showPopup('komplainPopup')">📢 Kirim Komplain</button>

<button onclick="showPopup('kontakPopup')">📞 Kontak Pengurus</button>

<button onclick="exportExcel()">📊 Export Excel</button>

<button onclick="logout()">🚪 Logout</button>

</div>



<!-- MAIN DASHBOARD -->

<div class="mainContainer">

<div class="dashboard">

<div class="card">
<h3>Total Iuran</h3>
<p id="totalIuran">Rp 0</p>
</div>

<div class="card">
<h3>Total Pengeluaran</h3>
<p id="totalKeluar">Rp 0</p>
</div>

<div class="card">
<h3>Total Kas</h3>
<p id="totalKas">Rp 0</p>
</div>

</div>

</div>



<!-- POPUP IURAN -->

<div class="popup" id="iuranPopup">

<div class="popupBox">

<h3>Input Iuran</h3>

<input id="blokInput" placeholder="Blok">

<input id="rumahInput" placeholder="Nomor Rumah">

<input id="jumlahInput" placeholder="Jumlah">

<button onclick="simpanIuran()">Simpan</button>

<button onclick="closePopup()">Tutup</button>

</div>

</div>



<!-- POPUP PENGELUARAN -->

<div class="popup" id="keluarPopup">

<div class="popupBox">

<h3>Input Pengeluaran</h3>

<input id="ketInput" placeholder="Keterangan">

<input id="jumlahKeluar" placeholder="Jumlah">

<button onclick="simpanKeluar()">Simpan</button>

<button onclick="closePopup()">Tutup</button>

</div>

</div>



<!-- POPUP KOMPLAIN -->

<div class="popup" id="komplainPopup">

<div class="popupBox">

<h3>Kirim Komplain</h3>

<textarea id="isiKomplain"></textarea>

<button onclick="kirimKomplain()">Kirim</button>

<button onclick="closePopup()">Tutup</button>

</div>

</div>



<!-- POPUP KONTAK -->

<div class="popup" id="kontakPopup">

<div class="popupBox">

<h3>Kontak Pengurus</h3>

<p>Ketua : 08xxxxxxxx</p>
<p>Bendahara : 08xxxxxxxx</p>

<button onclick="closePopup()">Tutup</button>

</div>

</div>



<script>

function toggleMenu(){

let menu = document.getElementById("sidebar")

menu.classList.toggle("active")

}

function showPopup(id){

document.getElementById(id).style.display="block"

}

function closePopup(){

let pop = document.querySelectorAll(".popup")

pop.forEach(p => p.style.display="none")

}

</script>


<script src="app.js"></script>


</body>
</html>
