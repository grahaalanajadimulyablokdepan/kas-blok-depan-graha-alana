<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard Kas</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script src="firebase.js"></script>

</head>

<body onload="initDashboard()">

<header class="header">

<div class="logoArea">

<span>KAS BLOK DEPAN ALANA</span>

</div>

<div class="hamburger" onclick="toggleMenu()">☰</div>

</header>


<div id="sidebar" class="sidebar">

<button id="btnIuran" onclick="openPopup('popupIuran')">Input Iuran</button>

<button id="btnKeluar" onclick="openPopup('popupKeluar')">Input Pengeluaran</button>

<button onclick="exportExcel()">Export Excel</button>

<button onclick="logout()">Logout</button>

</div>


<div class="dashboard">

<div class="card">
<h3>Total Iuran</h3>
<p id="totalIuran">Rp 0</p>
</div>

<div class="card">
<h3>Total Pengeluaran</h3>
<p id="totalKeluar">Rp 0</p>
</div>

<div class="card">
<h3>Total Kas</h3>
<p id="totalKas">Rp 0</p>
</div>

</div>


<div class="chartBox">
<canvas id="chartKas"></canvas>
</div>


<div class="tableBox">

<h2>Data Iuran</h2>

<table>

<thead>
<tr>
<th>Blok</th>
<th>Rumah</th>
<th>Jumlah</th>
<th>Aksi</th>
</tr>
</thead>

<tbody id="tabelIuran"></tbody>

</table>

</div>


<div id="popupIuran" class="popup">
<div class="popupBox">

<h3>Input Iuran</h3>

<input id="iuranBlok">
<input id="iuranRumah">
<input id="jumlahIuran">

<button onclick="simpanIuran()">Simpan</button>
<button onclick="closePopup()">Tutup</button>

</div>
</div>


<div id="popupKeluar" class="popup">
<div class="popupBox">

<h3>Input Pengeluaran</h3>

<input id="ketKeluar">
<input id="jumlahKeluar">

<button onclick="simpanKeluar()">Simpan</button>
<button onclick="closePopup()">Tutup</button>

</div>
</div>

<script src="app.js"></script>

</body>
</html>
