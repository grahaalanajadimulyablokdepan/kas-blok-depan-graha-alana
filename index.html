<!DOCTYPE html>
<html lang="id">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kas Blok Depan Graha Alana</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

</head>

<body>

<header>
<h1>Kas Blok Depan Graha Alana</h1>
<p>Blok A1 • A2 • A3 • B1 • B2 • B3</p>
</header>

<div id="loginBox" style="padding:20px;background:#fff;border:1px solid #ddd;margin:20px">
<h3>Login Pengurus</h3>

<input id="adminPass" type="password" placeholder="Password pengurus">

<button onclick="loginAdmin()">Login</button>

</div>

<div class="container">

<div class="dashboard">

<div class="card">
<h3>Total Kas</h3>
<p id="totalKas">Rp0</p>
</div>

<div class="card">
<h3>Iuran Masuk</h3>
<p id="totalIuran">Rp0</p>
</div>

<div class="card">
<h3>Pengeluaran</h3>
<p id="totalKeluar">Rp0</p>
</div>

</div>

<div class="card">

<h2>Grafik Kas</h2>

<canvas id="chart"></canvas>

</div>


<div id="adminPanel" style="display:none">

<div class="card">

<h2>Input Iuran</h2>

<input id="nama" placeholder="Nama warga">

<select id="blok">
<option>A1</option>
<option>A2</option>
<option>A3</option>
<option>B1</option>
<option>B2</option>
<option>B3</option>
</select>

<input id="rumah" placeholder="Nomor rumah">

<select id="bulan">
<option>Januari</option>
<option>Februari</option>
<option>Maret</option>
<option>April</option>
<option>Mei</option>
<option>Juni</option>
<option>Juli</option>
<option>Agustus</option>
<option>September</option>
<option>Oktober</option>
<option>November</option>
<option>Desember</option>
</select>

<input id="tahun" placeholder="Tahun (contoh 2026)">

<input id="jumlah" placeholder="Jumlah iuran">

<button onclick="tambahIuran()">Simpan Iuran</button>

</div>


<div class="card">

<h2>Input Pengeluaran</h2>

<input id="ket" placeholder="Keterangan">

<input id="jumlahKeluar" placeholder="Jumlah pengeluaran">

<button onclick="tambahPengeluaran()">Simpan</button>

</div>

</div>


<div class="card">

<h2>Cek Iuran Rumah</h2>

<input id="cek" placeholder="contoh A1-10" onkeyup="cekRumah()">

<div id="hasil"></div>

</div>


<div class="card">

<h2>Riwayat Iuran</h2>

<table border="1" width="100%">

<thead>
<tr>
<th>Nama</th>
<th>Blok</th>
<th>Rumah</th>
<th>Bulan</th>
<th>Tahun</th>
<th>Jumlah</th>
</tr>
</thead>

<tbody id="tabelIuran"></tbody>

</table>

</div>

</div>


<script src="firebase.js"></script>
<script src="app.js"></script>

<script>

function loginAdmin(){

let pass = document.getElementById("adminPass").value

if(pass === "blokdepan123"){

document.getElementById("adminPanel").style.display="block"
document.getElementById("loginBox").style.display="none"

}else{

alert("Password salah")

}

}

</script>

</body>
</html>
