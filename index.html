<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>KAS Graha Alana Blok Depan</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

</head>

<body>

<!-- HEADER -->

<header class="header">

<div class="logo">
🏡 KAS GRAHA ALANA BLOK DEPAN
</div>

<button class="hamburger" onclick="toggleMenu()">
☰
</button>

</header>

<!-- SIDE MENU -->

<div id="sideMenu" class="sideMenu">

<h4>Graha Alana</h4>

<button onclick="showPopup('visiPopup')">Visi & Misi</button>
<button onclick="showPopup('fasilitasPopup')">Fasilitas</button>
<button onclick="showPopup('keamananPopup')">Sistem Keamanan</button>
<button onclick="showPopup('peraturanPopup')">Peraturan</button>
<button onclick="showPopup('pengumumanPopup')">Pengumuman</button>
<button onclick="showPopup('kontakPopup')">Kontak Pengurus</button>

<button onclick="showPopup('komplainPopup')">Komplain Warga</button>
<button onclick="showPopup('listKomplainPopup')">Daftar Komplain</button>

</div>

<!-- DASHBOARD -->

<div class="container mt-4">

<div class="row g-3">

<div class="col-md-4">
<div class="card">
<div class="card-body text-center">
<h5>Total Iuran</h5>
<h3 id="totalIuran">Rp0</h3>
</div>
</div>
</div>

<div class="col-md-4">
<div class="card">
<div class="card-body text-center">
<h5>Total Pengeluaran</h5>
<h3 id="totalKeluar">Rp0</h3>
</div>
</div>
</div>

<div class="col-md-4">
<div class="card">
<div class="card-body text-center">
<h5>Total Kas</h5>
<h3 id="totalKas">Rp0</h3>

<button class="btn btn-sm btn-dark mt-2" onclick="detailKas()">
Detail Kas
</button>

</div>
</div>
</div>

</div>

<!-- GRAFIK -->

<div class="card mt-4">

<div class="card-body">

<h5>Grafik Kas</h5>

<canvas id="chartKas"></canvas>

</div>

</div>

<!-- RUMAH BELUM BAYAR -->

<div class="card mt-4">

<div class="card-body">

<h5>Rumah Belum Bayar</h5>

<div id="rumahBelumBayar"></div>

</div>

</div>

<!-- PETA BLOK -->

<div class="card mt-4">

<div class="card-body">

<h5>Peta Blok Rumah</h5>

<div id="mapPerumahan"></div>

</div>

</div>

<!-- BUTTON ACTION -->

<div class="actionButtons">

<button onclick="showPopup('loginAdmin')">
Login Admin
</button>

<button onclick="showPopup('loginWarga')">
Login Warga
</button>

<button onclick="showPopup('iuranPopup')">
Input Iuran
</button>

<button onclick="showPopup('pengeluaranPopup')">
Input Pengeluaran
</button>

<button onclick="exportExcel()">
Export Excel
</button>

</div>

</div>

<!-- POPUP LOGIN ADMIN -->

<div class="popup" id="loginAdmin">

<div class="popupContent">

<h4>Login Admin</h4>

<input id="adminUser" placeholder="Username">
<input id="adminPass" type="password" placeholder="Password">

<button onclick="loginAdmin()">Login</button>

</div>

</div>

<!-- POPUP LOGIN WARGA -->

<div class="popup" id="loginWarga">

<div class="popupContent">

<h4>Login Warga</h4>

<input id="wargaNama" placeholder="Nama">
<input id="wargaBlok" placeholder="Blok">
<input id="wargaRumah" placeholder="No Rumah">

<button onclick="loginWarga()">Login</button>

</div>

</div>

<!-- POPUP IURAN -->

<div class="popup" id="iuranPopup">

<div class="popupContent">

<h4>Input Iuran</h4>

<input id="namaIuran" placeholder="Nama">
<select id="blokIuran"></select>
<select id="rumahIuran"></select>

<select id="tglIuran"></select>
<select id="blnIuran"></select>
<select id="thnIuran"></select>

<input id="nominalIuran" placeholder="Nominal">

<button onclick="tambahIuran()">Simpan</button>

</div>

</div>

<!-- POPUP PENGELUARAN -->

<div class="popup" id="pengeluaranPopup">

<div class="popupContent">

<h4>Input Pengeluaran</h4>

<select id="tglKeluar"></select>
<select id="blnKeluar"></select>
<select id="thnKeluar"></select>

<input id="ketKeluar" placeholder="Keterangan">
<input id="nominalKeluar" placeholder="Nominal">

<button onclick="tambahPengeluaran()">Simpan</button>

</div>

</div>

<!-- POPUP KOMPLAIN -->

<div class="popup" id="komplainPopup">

<div class="popupContent">

<h4>Komplain Warga</h4>

<input id="namaKomplain" placeholder="Nama">
<input id="blokKomplain" placeholder="Blok">

<select id="tglKomplain"></select>
<select id="blnKomplain"></select>
<select id="thnKomplain"></select>

<textarea id="isiKomplain"></textarea>

<button onclick="kirimKomplain()">Kirim</button>

</div>

</div>

<script src="firebase.js"></script>
<script src="app.js"></script>

</body>
</html>
