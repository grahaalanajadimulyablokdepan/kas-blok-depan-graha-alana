<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login Kas Graha Alana</title>

<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script src="firebase.js"></script>

</head>

<body class="loginPage">

<div class="loginBox">

<h1>KAS BLOK DEPAN ALANA</h1>
<p>Sistem Transparansi Kas Warga</p>

<select id="blok">
<option value="">Pilih Blok</option>
<option value="A1">A1</option>
<option value="A2">A2</option>
<option value="A3">A3</option>
<option value="B1">B1</option>
<option value="B2">B2</option>
<option value="B3">B3</option>
</select>

<select id="rumah">
<option value="">Nomor Rumah</option>
</select>

<input
type="password"
id="password"
placeholder="Password (1-8)"
onkeypress="if(event.key==='Enter'){loginWarga()}"
>

<button onclick="loginWarga()">Login Warga</button>
<button onclick="openAdmin()">Login Admin</button>

</div>


<div id="adminPopup" class="popup">

<div class="popupBox">

<h2>Login Admin</h2>

<input id="adminUser" placeholder="Username">

<input
id="adminPass"
type="password"
placeholder="Password"
onkeypress="if(event.key==='Enter'){loginAdmin()}"
>

<button onclick="loginAdmin()">Masuk</button>
<button onclick="closePopup()">Tutup</button>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
